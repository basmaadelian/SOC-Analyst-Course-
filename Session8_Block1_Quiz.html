<head>
<meta charset="UTF-8">

<title>Session 8, Block 1 — Knowledge Check</title>
<style>
  :root{
    --bg:#0a0e14;
    --panel:#11161d;
    --panel2:#161d26;
    --border:#232c37;
    --text:#c9d1d9;
    --muted:#7d8894;
    --green:#3fb950;
    --green-dim:#1b3a24;
    --red:#f85149;
    --red-dim:#3a1f1f;
    --amber:#d29922;
    --amber-dim:#3a2f14;
    --blue:#58a6ff;
    --purple:#bc8cff;
    --navy-accent:#0d2b4a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:"SF Mono","JetBrains Mono","Fira Code",Consolas,"Courier New",monospace;
    min-height:100vh;
    line-height:1.55;
  }

  /* ---------- Sticky header ---------- */
  header.topbar{
    position:sticky;
    top:0;
    z-index:100;
    background:rgba(10,14,20,0.96);
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--border);
    padding:14px 20px 12px 20px;
  }
  .topbar-inner{max-width:760px;margin:0 auto;}
  .titlebar{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .titlebar h1{
    font-size:15px;
    margin:0;
    color:var(--text);
    font-weight:700;
    letter-spacing:.02em;
  }
  .titlebar h1 .prompt{color:var(--green);margin-right:6px;}
  .titlebar .progress-count{font-size:12.5px;color:var(--muted);white-space:nowrap;}

  .progress-track{
    margin-top:10px;
    height:6px;
    background:var(--panel2);
    border-radius:4px;
    overflow:hidden;
    border:1px solid var(--border);
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg,var(--green),#2ea043);
    width:0%;
    transition:width .35s ease;
  }

  .pills{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:10px;
  }
  .pill{
    font-size:10.5px;
    padding:4px 9px;
    border-radius:20px;
    border:1px solid var(--border);
    color:var(--muted);
    background:var(--panel2);
    white-space:nowrap;
  }
  .pill.current{border-color:var(--blue);color:var(--blue);}
  .pill.done-good{border-color:var(--green);color:var(--green);background:var(--green-dim);}
  .pill.done-mixed{border-color:var(--amber);color:var(--amber);background:var(--amber-dim);}
  .pill.done-bad{border-color:var(--red);color:var(--red);background:var(--red-dim);}

  /* ---------- Main content ---------- */
  main{max-width:760px;margin:0 auto;padding:28px 20px 80px 20px;}

  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    padding:26px 26px 24px 26px;
  }

  .tagrow{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
  .tag{
    font-size:10.5px;
    font-weight:700;
    letter-spacing:.05em;
    text-transform:uppercase;
    padding:4px 10px;
    border-radius:4px;
  }
  .tag.section{background:var(--navy-accent);color:#9fc4e3;}
  .tag.type-concept{background:#122b45;color:var(--blue);}
  .tag.type-application{background:#2a1f45;color:var(--purple);}
  .tag.type-soc{background:var(--green-dim);color:var(--green);}
  .tag.type-scenario{background:var(--amber-dim);color:var(--amber);}

  .qtext{
    font-size:16px;
    color:#e6edf3;
    margin:0 0 20px 0;
    line-height:1.6;
  }
  .qtext .qnum{color:var(--green);margin-right:8px;}

  .options{display:flex;flex-direction:column;gap:10px;}
  .option{
    text-align:left;
    background:var(--panel2);
    border:1px solid var(--border);
    color:var(--text);
    padding:13px 16px;
    border-radius:8px;
    font-family:inherit;
    font-size:14px;
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
    display:flex;
    gap:10px;
  }
  .option:hover:not(.locked){border-color:var(--blue);background:#182230;}
  .option .letter{color:var(--muted);font-weight:700;}
  .option.correct{border-color:var(--green);background:var(--green-dim);color:#d7f5df;}
  .option.correct .letter{color:var(--green);}
  .option.incorrect{border-color:var(--red);background:var(--red-dim);color:#ffd9d7;}
  .option.incorrect .letter{color:var(--red);}
  .option.locked{cursor:default;}
  .option.faded{opacity:.45;}

  .feedback{
    margin-top:20px;
    border-radius:8px;
    padding:16px 18px;
    display:none;
  }
  .feedback.show{display:block;animation:fadein .25s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}

  .feedback .result-line{
    font-size:13px;
    font-weight:700;
    margin-bottom:10px;
    letter-spacing:.02em;
  }
  .feedback.correct-fb{background:#0f1f14;border:1px solid var(--green);}
  .feedback.correct-fb .result-line{color:var(--green);}
  .feedback.incorrect-fb{background:#20100f;border:1px solid var(--red);}
  .feedback.incorrect-fb .result-line{color:var(--red);}

  .explain{font-size:13.5px;color:#d7dee5;margin-bottom:14px;}

  .soclens{
    font-size:13px;
    color:var(--amber);
    background:var(--amber-dim);
    border-left:3px solid var(--amber);
    padding:10px 12px;
    border-radius:4px;
  }
  .soclens .soclabel{
    font-weight:700;
    font-size:10.5px;
    letter-spacing:.06em;
    text-transform:uppercase;
    display:block;
    margin-bottom:5px;
    color:var(--amber);
  }

  .navrow{display:flex;justify-content:flex-end;margin-top:22px;}
  button.nextbtn{
    background:var(--green);
    color:#04140a;
    border:none;
    font-family:inherit;
    font-weight:700;
    font-size:13.5px;
    padding:11px 22px;
    border-radius:7px;
    cursor:pointer;
    letter-spacing:.02em;
  }
  button.nextbtn:hover{background:#4fd063;}

  /* ---------- Results screen ---------- */
  .results h2{font-size:20px;color:#e6edf3;margin:0 0 4px 0;}
  .results .sub{color:var(--muted);font-size:13px;margin-bottom:26px;}
  .bigscore{
    font-size:52px;
    font-weight:700;
    color:var(--green);
    margin:10px 0 4px 0;
  }
  .bigscore.mid{color:var(--amber);}
  .bigscore.low{color:var(--red);}
  .scoretag{color:var(--muted);font-size:13px;margin-bottom:28px;}

  .sectionrow{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 0;
    border-bottom:1px solid var(--border);
    font-size:13.5px;
  }
  .sectionrow:last-of-type{border-bottom:none;}
  .sectionrow .sname{color:#dfe6ec;}
  .sectionrow .sscore{font-weight:700;}
  .sectionrow .sscore.good{color:var(--green);}
  .sectionrow .sscore.mid{color:var(--amber);}
  .sectionrow .sscore.bad{color:var(--red);}

  .restartbtn{
    margin-top:28px;
    background:transparent;
    border:1px solid var(--blue);
    color:var(--blue);
    font-family:inherit;
    font-size:13.5px;
    font-weight:700;
    padding:11px 22px;
    border-radius:7px;
    cursor:pointer;
  }
  .restartbtn:hover{background:#0d1b2a;}

  footer.pagefoot{
    max-width:760px;
    margin:0 auto;
    padding:10px 20px 40px 20px;
    text-align:center;
    font-size:11.5px;
    color:var(--muted);
  }
  footer.pagefoot a{color:var(--blue);text-decoration:none;}

  @media (max-width:600px){
    .qtext{font-size:15px;}
    .bigscore{font-size:42px;}
  }
</style>
</head>

        soc: "These tools are invisible when working correctly — which is exactly why their failure often goes unnoticed until an analyst realizes a source has gone quiet."
      },
      {
        type: "Application",
        q: "According to the \"start with the end in mind\" planning approach, what should a security team define first when building a monitoring strategy?",
        options: [
          "The exact SIEM vendor to purchase",
          "The critical incidents that would cause the most damage, to determine which logs are required for timely detection",
          "The total number of employees at the company",
          "The color scheme of the SIEM dashboard"
        ],
        correct: 1,
        explain: "Planning begins by identifying the critical incidents that would cause the most damage; the security team then identifies exactly which logs are required for timely detection of those specific events.",
        soc: "This is the same \"start with the end in mind\" principle from Stage 4, now applied specifically to monitoring strategy rather than raw log source rollout."
      },
      {
        type: "SOC",
        q: "In the individual log entry review workflow, what distinguishes a \"Known Bad Entry\" from an \"Out-of-Baseline Entry\"?",
        options: [
          "There is no difference; both require the same response",
          "A Known Bad Entry is already documented as a problem indicator and skips straight to Verify Impact, while an Out-of-Baseline Entry has unknown status and requires investigation",
          "Out-of-Baseline entries are always false positives",
          "Known Bad Entries never require any action"
        ],
        correct: 1,
        explain: "A Known Bad Entry is already documented from prior experience or threat intelligence and skips straight to Verify Impact. An Out-of-Baseline Entry doesn't match the normal baseline but its status is unknown, so it requires investigation first.",
        soc: "Recognizing which bucket you're in immediately tells you whether you're confirming scope (known bad) or still determining whether there's a problem at all (out-of-baseline)."
      },
      {
        type: "Scenario",
        q: "After investigating an out-of-baseline log entry, an analyst still cannot conclusively determine whether it's malicious. What is the correct next step according to the workflow?",
        options: [
          "Immediately declare a full incident response",
          "Escalate the investigation further, without yet declaring it an incident",
          "Ignore it since it can't be confirmed",
          "Document it as \"Good\" by default"
        ],
        correct: 1,
        explain: "An \"Unknown (after analysis)\" result escalates to deeper investigation, but is explicitly not yet an incident — escalation and incident declaration are two different things, and conflating them is a common beginner mistake.",
        soc: "Jumping straight to \"this is an incident\" before escalation is complete can trigger unnecessary containment actions — and just as dangerously, calling something \"not an incident\" too early can let a real one slip past."
      },
      {
        type: "Concept",
        q: "What does \"tuning\" a monitoring process primarily involve?",
        options: [
          "Deleting logs to save storage space",
          "Adjusting rules and baselines based on confirmed false positives and new use cases to improve detection accuracy over time",
          "Purchasing new hardware annually",
          "Restricting analyst access to logs"
        ],
        correct: 1,
        explain: "Tuning involves adjusting rules or security controls based on confirmed-good outcomes to reduce false positives, along with expanding use cases as the program matures — keeping detection accurate over time.",
        soc: "A monitoring program that's never tuned slowly drowns in its own false positives — tuning is what keeps the signal-to-noise ratio usable for analysts long after go-live."
      }
    ]
  }
];

// ---------- Flatten questions with section metadata ----------
const FLAT = [];
QUIZ_DATA.forEach((sec, sIdx) => {
  sec.questions.forEach((q, qIdx) => {
    FLAT.push(Object.assign({}, q, { sectionIndex: sIdx, sectionShort: sec.short, sectionName: sec.section, qIdxInSection: qIdx }));
  });
});
const TOTAL = FLAT.length;

let current = 0;
let answered = new Array(TOTAL).fill(null); // stores selected option index
let sectionStats = QUIZ_DATA.map(sec => ({ correct: 0, total: sec.questions.length }));

const letters = ["A", "B", "C", "D", "E"];

function typeClass(t) {
  return "type-" + t.toLowerCase();
}

function renderPills() {
  const row = document.getElementById("pillsRow");
  row.innerHTML = "";
  QUIZ_DATA.forEach((sec, i) => {
    const stat = sectionStats[i];
    const pill = document.createElement("span");
    let cls = "pill";
    const answeredInSection = FLAT.filter((f, idx) => f.sectionIndex === i && answered[idx] !== null).length;
    if (i === FLAT[current].sectionIndex) cls += " current";
    if (answeredInSection === stat.total && stat.total > 0) {
      const ratio = stat.correct / stat.total;
      if (ratio >= 0.8) cls += " done-good";
      else if (ratio >= 0.5) cls += " done-mixed";
      else cls += " done-bad";
    }
    pill.className = cls;
    pill.textContent = sec.short + (answeredInSection === stat.total ? " (" + stat.correct + "/" + stat.total + ")" : "");
    row.appendChild(pill);
  });
}

function renderProgress() {
  document.getElementById("progressCount").textContent = "Question " + (current + 1) + " of " + TOTAL;
  const pct = Math.round(((current) / TOTAL) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
}

function renderQuestion() {
  const item = FLAT[current];
  const card = document.getElementById("quizCard");
  const already = answered[current];

  let optionsHtml = "";
  item.options.forEach((opt, i) => {
    let cls = "option";
    if (already !== null) {
      cls += " locked";
      if (i === item.correct) cls += " correct";
      else if (i === already) cls += " incorrect";
      else cls += " faded";
    }
    optionsHtml += '<button class="' + cls + '" data-idx="' + i + '" onclick="selectOption(' + i + ')" ' + (already !== null ? "disabled" : "") + '>' +
      '<span class="letter">' + letters[i] + '.</span><span>' + opt + '</span></button>';
  });

  let feedbackHtml = "";
  if (already !== null) {
    const isCorrect = already === item.correct;
    feedbackHtml = '<div class="feedback show ' + (isCorrect ? "correct-fb" : "incorrect-fb") + '">' +
      '<div class="result-line">' + (isCorrect ? "&#10003; Correct" : "&#10007; Not quite") + '</div>' +
      '<div class="explain">' + item.explain + '</div>' +
      '<div class="soclens"><span class="soclabel">SOC Lens</span>' + item.soc + '</div>' +
      '</div>' +
      '<div class="navrow"><button class="nextbtn" onclick="nextQuestion()">' + (current === TOTAL - 1 ? "See Results →" : "Next Question →") + '</button></div>';
  }

  card.innerHTML =
    '<div class="tagrow">' +
      '<span class="tag section">' + item.sectionName + '</span>' +
      '<span class="tag ' + typeClass(item.type) + '">' + item.type + '</span>' +
    '</div>' +
    '<p class="qtext"><span class="qnum">Q' + (current + 1) + '.</span>' + item.q + '</p>' +
    '<div class="options">' + optionsHtml + '</div>' +
    feedbackHtml;

  renderProgress();
  renderPills();
}

function selectOption(i) {
  if (answered[current] !== null) return;
  answered[current] = i;
  const item = FLAT[current];
  if (i === item.correct) {
    sectionStats[item.sectionIndex].correct += 1;
  }
  renderQuestion();
}

function nextQuestion() {
  if (current < TOTAL - 1) {
    current += 1;
    renderQuestion();
    window.scrollTo({ top: 0, behavior: "smooth" });
  } else {
    showResults();
  }
}

function showResults() {
  document.getElementById("progressFill").style.width = "100%";
  document.getElementById("progressCount").textContent = "Complete";

  const totalCorrect = sectionStats.reduce((a, s) => a + s.correct, 0);
  const pct = Math.round((totalCorrect / TOTAL) * 100);
  let scoreClass = "";
  if (pct < 60) scoreClass = "low";
  else if (pct < 80) scoreClass = "mid";

  let rowsHtml = "";
  QUIZ_DATA.forEach((sec, i) => {
    const stat = sectionStats[i];
    const ratio = stat.correct / stat.total;
    let sc = "good";
    if (ratio < 0.5) sc = "bad";
    else if (ratio < 0.8) sc = "mid";
    rowsHtml += '<div class="sectionrow"><span class="sname">' + sec.section + '</span><span class="sscore ' + sc + '">' + stat.correct + ' / ' + stat.total + '</span></div>';
  });

  const card = document.getElementById("quizCard");
  card.innerHTML =
    '<div class="results">' +
    '<h2>Knowledge Check Complete</h2>' +
    '<div class="sub">Session 8, Block 1 — Logging &amp; Monitoring Best Practices</div>' +
    '<div class="bigscore ' + scoreClass + '">' + pct + '%</div>' +
    '<div class="scoretag">' + totalCorrect + ' of ' + TOTAL + ' correct</div>' +
    rowsHtml +
    '<button class="restartbtn" onclick="restartQuiz()">&#8635; Restart Quiz</button>' +
    '</div>';

  renderPillsFinal();
}

function renderPillsFinal() {
  const row = document.getElementById("pillsRow");
  row.innerHTML = "";
  QUIZ_DATA.forEach((sec, i) => {
    const stat = sectionStats[i];
    const ratio = stat.correct / stat.total;
    let cls = "pill";
    if (ratio >= 0.8) cls += " done-good";
    else if (ratio >= 0.5) cls += " done-mixed";
    else cls += " done-bad";
    const pill = document.createElement("span");
    pill.className = cls;
    pill.textContent = sec.short + " (" + stat.correct + "/" + stat.total + ")";
    row.appendChild(pill);
  });
}

function restartQuiz() {
  current = 0;
  answered = new Array(TOTAL).fill(null);
  sectionStats = QUIZ_DATA.map(sec => ({ correct: 0, total: sec.questions.length }));
  renderQuestion();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

renderQuestion();
</script>
