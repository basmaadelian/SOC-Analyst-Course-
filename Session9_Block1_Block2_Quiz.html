// ============================================================
// Fisher–Yates shuffle
// ============================================================
function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let runtimeQuestions = [];
let answered = {};
let scores = {};

function buildRuntimeQuestions(){
  runtimeQuestions = QUESTIONS.map(q => {
    const shuffledOptions = shuffle(q.options);
    return { ...q, shuffledOptions, correctIndex: shuffledOptions.findIndex(o => o.correct) };
  });
}

function initScores(){
  scores = {};
  Object.keys(SECTIONS).forEach(k => scores[k] = { correct: 0, total: 0 });
  runtimeQuestions.forEach(q => scores[q.section].total++);
}

const LETTERS = ["A","B","C","D"];

function render(){
  const root = document.getElementById("quizRoot");
  root.innerHTML = "";
  answered = {};

  let currentSection = null;
  let sectionCounters = {};
  Object.keys(SECTIONS).forEach(k => sectionCounters[k] = 0);

  runtimeQuestions.forEach((q, idx) => {
    if(q.section !== currentSection){
      currentSection = q.section;
      const div = document.createElement("div");
      div.className = "section-divider";
      const sectionTotal = runtimeQuestions.filter(x => x.section === currentSection).length;
      div.innerHTML = `<span class="tag">${SECTIONS[currentSection].short}</span><h2>${SECTIONS[currentSection].label}</h2><span class="count">${sectionTotal} questions</span>`;
      root.appendChild(div);
    }
    sectionCounters[q.section]++;

    const card = document.createElement("div");
    card.className = "card";
    card.id = "card" + idx;

    const optsHtml = q.shuffledOptions.map((opt, i) => `
      <button class="opt" data-idx="${idx}" data-opt="${i}" onclick="selectAnswer(${idx}, ${i})">
        <span class="letter">${LETTERS[i]}</span><span>${opt.text}</span>
      </button>
    `).join("");

    card.innerHTML = `
      <div class="qmeta">
        <span class="qnum">${SECTIONS[q.section].short} · Q${sectionCounters[q.section]}</span>
        <span class="qtype ${q.type}">${q.type}</span>
      </div>
      <div class="qtext">${q.q}</div>
      <div class="options">${optsHtml}</div>
      <div class="feedback" id="fb${idx}">
        <div class="verdict" id="verdict${idx}"></div>
        <div class="explain" id="explain${idx}"></div>
        <div class="soclens"><b>SOC Lens:</b> <span id="soclens${idx}"></span></div>
      </div>
    `;
    root.appendChild(card);
  });

  renderPills();
  updateProgress();
  document.getElementById("scorecard").classList.remove("show");
}

function renderPills(){
  const row = document.getElementById("pillRow");
  row.innerHTML = Object.keys(SECTIONS).map(k =>
    `<span class="pill" id="pill-${k}"><b id="pillnum-${k}">0/${scores[k].total}</b> ${SECTIONS[k].short}</span>`
  ).join("");
}

function updatePills(){
  Object.keys(SECTIONS).forEach(k => {
    document.getElementById("pillnum-" + k).textContent = `${scores[k].correct}/${scores[k].total}`;
  });
}

function updateProgress(){
  const total = runtimeQuestions.length;
  const done = Object.keys(answered).length;
  document.getElementById("progressNum").textContent = `${done} / ${total} answered`;
  document.getElementById("progressFill").style.width = (done / total * 100) + "%";
  if(done === total) showScorecard();
}

function selectAnswer(idx, chosenOpt){
  if(answered[idx] !== undefined) return;
  answered[idx] = chosenOpt;

  const q = runtimeQuestions[idx];
  const isCorrect = chosenOpt === q.correctIndex;
  if(isCorrect) scores[q.section].correct++;
  updatePills();

  const card = document.getElementById("card" + idx);
  const buttons = card.querySelectorAll(".opt");
  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if(i === q.correctIndex) btn.classList.add("correct");
    else if(i === chosenOpt) btn.classList.add("incorrect");
    else btn.classList.add("dim");
  });

  const fb = document.getElementById("fb" + idx);
  fb.classList.add("show");
  const verdict = document.getElementById("verdict" + idx);
  verdict.textContent = isCorrect ? "✓ Correct" : "✗ Not quite";
  verdict.className = "verdict " + (isCorrect ? "right" : "wrong");
  document.getElementById("explain" + idx).textContent = q.explain;
  document.getElementById("soclens" + idx).textContent = q.soclens;

  updateProgress();
  card.scrollIntoView({ behavior:"smooth", block:"nearest" });
}

function showScorecard(){
  const totalCorrect = Object.values(scores).reduce((a,b) => a + b.correct, 0);
  const totalQ = runtimeQuestions.length;
  const pct = Math.round(totalCorrect / totalQ * 100);

  document.getElementById("scorePct").textContent = pct + "%";
  document.getElementById("scoreSub").textContent = `${totalCorrect} of ${totalQ} correct`;

  const breakdown = document.getElementById("breakdownRow");
  breakdown.innerHTML = Object.keys(SECTIONS).map(k => `
    <div class="box">
      <div class="num">${scores[k].correct}/${scores[k].total}</div>
      <div class="lbl">${SECTIONS[k].short}</div>
    </div>
  `).join("");

  setTimeout(() => {
    document.getElementById("scorecard").classList.add("show");
    document.getElementById("scorecard").scrollIntoView({ behavior:"smooth", block:"start" });
  }, 300);
}

function restartQuiz(){
  buildRuntimeQuestions();
  initScores();
  render();
  window.scrollTo({ top:0, behavior:"smooth" });
}

// ---------------- init ----------------
buildRuntimeQuestions();
initScores();
render();
